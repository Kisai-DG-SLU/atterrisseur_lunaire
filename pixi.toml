[workspace]
authors = ["Damien GUESDON <kisai.dg.slu@gmail.com>"]
channels = ["conda-forge"]
name = "atterrisseur_lunaire"
platforms = ["osx-64", "linux-64"]
version = "0.1.0"

[tasks]
register-kernel = "python -m ipykernel install --user --name atterrisseur_lunaire --display-name \"Eagle-1\""
lab = "jupyter lab notebooks/"
notebook = "jupyter notebook notebooks/"

[dependencies]
python = "3.10.*"
gymnasium = ">=1.2.3,<2"
stable-baselines3 = ">=2.7.1,<3"
matplotlib = ">=3.10.8,<4"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.2.0,<8"
